apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-server
  template:
    metadata:
      labels:
        app: traffic-server
    spec:
      containers:
      - name: server
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-server
spec:
  selector:
    app: traffic-server
  ports:
  - port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-client
  template:
    metadata:
      labels:
        app: traffic-client
    spec:
      containers:
      - name: client
        image: curlimages/curl
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            curl traffic-server
            sleep 2
          done